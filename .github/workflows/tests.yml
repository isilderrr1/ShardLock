name: ShardLock CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          pip install poetry
          poetry install

      - name: Run Quality Check
        run: |
          # Qui potresti aggiungere test unitari (pytest) 
          # Per ora verifichiamo che il modulo sia importabile
          poetry run python -c "from shardlock import crypto; print('Crypto Module OK')"